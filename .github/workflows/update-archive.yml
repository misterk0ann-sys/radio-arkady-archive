name: Update RADIO ARKADY archive

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "Maximum pages per hashtag. Use 250 for the first backfill; 25 for normal updates."
        required: true
        default: "250"

  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect public posts
        shell: bash
        run: |
          PAGES="${{ github.event.inputs.pages }}"

          if [ -z "$PAGES" ]; then
            PAGES="25"
          fi

          python collector.py --pages "$PAGES"

      - name: Commit updated archive
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add archive.json collection-report.json

          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Update RADIO ARKADY archive"
            git push
          fi
